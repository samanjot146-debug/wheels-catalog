<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>President Tire & Wheels - Wheels Catalog</title>

<style>

body{
font-family:Arial, sans-serif;
background:#000;
color:#fff;
margin:0;
padding:30px;
}

h1{
text-align:center;
color:#00FF7F;
margin-bottom:30px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:30px;
}

.filters select{
padding:10px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

#wheels-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.wheel-card{
background:#111;
border-radius:12px;
padding:18px;
text-align:center;
border:1px solid #222;
transition:all .25s;
}

.wheel-card:hover{
border-color:#00FF7F;
transform:translateY(-4px);
}

.wheel-card img{
width:100%;
height:160px;
object-fit:contain;
margin-bottom:12px;
}

.wheel-title{
font-weight:bold;
margin-bottom:6px;
}

.wheel-spec{
font-size:14px;
color:#ccc;
margin-bottom:8px;
}

.price{
color:#00FF7F;
font-weight:bold;
margin-bottom:10px;
}

.button{
display:inline-block;
background:#00FF7F;
color:#000;
padding:8px 12px;
border-radius:8px;
font-size:14px;
text-decoration:none;
font-weight:bold;
}

.button:hover{
opacity:.9;
}

.pagination{
display:flex;
justify-content:center;
margin-top:35px;
gap:10px;
flex-wrap:wrap;
}

.page-btn{
background:#111;
border:1px solid #333;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.page-btn.active{
background:#00FF7F;
color:#000;
border-color:#00FF7F;
}

.page-btn:hover{
border-color:#00FF7F;
color:#00FF7F;
}

</style>
</head>

<body>

<h1>President Tire & Wheels — Wheels Catalog</h1>

<div class="filters">

<select id="diameterFilter">
<option value="">Diameter</option>
</select>

<select id="brandFilter">
<option value="">Brand</option>
</select>

<select id="finishFilter">
<option value="">Finish</option>
</select>

</div>

<div id="wheels-grid"></div>

<div class="pagination" id="pagination"></div>

<script>

const CSV_URL =
"https://raw.githubusercontent.com/samanjot146-debug/wheels-catalog/main/wheels.csv";

const ITEMS_PER_PAGE = 20;

let wheels = [];
let filtered = [];
let currentPage = 1;

async function loadCSV(){

const response = await fetch(CSV_URL);
const text = await response.text();

const rows = text.split("\n").slice(1);

wheels = rows.map(row=>{

const cols = row.split(",");

return{

brand:cols[0],
model:cols[1],
finish:cols[4],
diameter:cols[5],
width:cols[6],
bolt:cols[7],
offset:cols[8],
price:cols[18],
image:cols[19]

}

});

filtered=[...wheels];

populateFilters();

render();

}

function populateFilters(){

const diameters=[...new Set(wheels.map(w=>w.diameter))];
const brands=[...new Set(wheels.map(w=>w.brand))];
const finishes=[...new Set(wheels.map(w=>w.finish))];

const d=document.getElementById("diameterFilter");
const b=document.getElementById("brandFilter");
const f=document.getElementById("finishFilter");

diameters.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.text=v+" inch";
d.appendChild(o);
});

brands.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.text=v;
b.appendChild(o);
});

finishes.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.text=v;
f.appendChild(o);
});

d.onchange=filter;
b.onchange=filter;
f.onchange=filter;

}

function filter(){

const d=document.getElementById("diameterFilter").value;
const b=document.getElementById("brandFilter").value;
const f=document.getElementById("finishFilter").value;

filtered=wheels.filter(w=>{

return (!d || w.diameter===d)
&&(!b || w.brand===b)
&&(!f || w.finish===f);

});

currentPage=1;

render();

}

function render(){

const start=(currentPage-1)*ITEMS_PER_PAGE;
const pageItems=filtered.slice(start,start+ITEMS_PER_PAGE);

const grid=document.getElementById("wheels-grid");

grid.innerHTML=pageItems.map(w=>`

<div class="wheel-card">

<img src="${w.image}" alt="${w.brand}">

<div class="wheel-title">${w.brand} ${w.model}</div>

<div class="wheel-spec">
${w.diameter}x${w.width}<br>
${w.bolt} ET${w.offset}<br>
${w.finish}
</div>

<div class="price">$${w.price}</div>

<a class="button" href="https://presidentwheels.ca/contact-us">
Request Quote
</a>

</div>

`).join("");

renderPagination();

}

function renderPagination(){

const pages=Math.ceil(filtered.length/ITEMS_PER_PAGE);

const container=document.getElementById("pagination");

container.innerHTML="";

for(let i=1;i<=pages;i++){

const btn=document.createElement("button");

btn.className="page-btn"+(i===currentPage?" active":"");

btn.innerText=i;

btn.onclick=()=>{

currentPage=i;

render();

window.scrollTo({top:0,behavior:"smooth"});

};

container.appendChild(btn);

}

}

loadCSV();

</script>

</body>
</html>
