<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>President Tire & Wheels Catalog</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    h1 {
      text-align: center;
      color: #ff6801;
      font-size: 40px;
      font-weight: 600;
      margin: 10px 0 10px;
    }

    .subtext {
      text-align: center;
      color: #555;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .toolbar-wrap {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(247,247,247,0.96);
      backdrop-filter: blur(10px);
      padding: 14px 0 16px;
      border-bottom: 1px solid #ececec;
      margin-bottom: 20px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .toolbar input,
    .toolbar select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d6d6d6;
      background: #fff;
      font-size: 15px;
      outline: none;
    }

    .toolbar input:focus,
    .toolbar select:focus {
      border-color: #ff6801;
      box-shadow: 0 0 0 3px rgba(255, 104, 1, 0.12);
    }

    .toolbar-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .results-count {
      color: #444;
      font-size: 15px;
      font-weight: 600;
    }

    .clear-btn {
      border: 1px solid #ff6801;
      background: #fff;
      color: #ff6801;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .clear-btn:hover {
      background: #fff5ef;
    }

    .active-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      background: #fff;
      border: 1px solid #ffd1b1;
      color: #ff6801;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    #status {
      text-align: center;
      color: #666;
      margin: 24px 0;
      font-size: 16px;
    }

    #wheels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 24px;
    }

    .wheel-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      border: 2px solid transparent;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .wheel-card:hover {
      transform: translateY(-6px);
      border-color: #ff6801;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
    }

    .img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand {
      color: #777;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .title {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .specs {
      color: #444;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .price {
      color: #ff6801;
      font-size: 22px;
      font-weight: 800;
      margin: 8px 0 14px;
    }

    .actions {
      margin-top: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1 1 auto;
      text-align: center;
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-call {
      background: #ff6801;
      color: #fff;
      border-color: #ff6801;
    }

    .btn-call:hover {
      background: #fff;
      color: #ff6801;
    }

    .btn-quote {
      background: #f2f2f2;
      color: #111;
      border-color: #d6d6d6;
    }

    .btn-quote:hover {
      background: #fff5ef;
      border-color: #ff6801;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .page-btn {
      border: 1px solid #ddd;
      background: white;
      color: #111;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      min-width: 44px;
    }

    .page-btn:hover {
      border-color: #ff6801;
      color: #ff6801;
    }

    .page-btn.active {
      background: #ff6801;
      color: white;
      border-color: #ff6801;
    }

    .page-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    @media (max-width: 1200px) {
      .toolbar {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    @media (max-width: 800px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }

      .container {
        padding: 24px 14px 40px;
      }

      .toolbar-bottom {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>President Tire & Wheels</h1>
    <div class="subtext">Shop wheels by size, brand, finish and bolt pattern</div>

    <div class="toolbar-wrap">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search brand, model, size, finish..." />

        <select id="diameterFilter">
          <option value="">All Sizes</option>
        </select>

        <select id="brandFilter">
          <option value="">All Brands</option>
        </select>

        <select id="finishFilter">
          <option value="">All Finishes</option>
        </select>

        <select id="boltFilter">
          <option value="">Bolt Pattern</option>
        </select>

        <select id="sortFilter">
          <option value="">Sort</option>
          <option value="price-low">Price: Low → High</option>
          <option value="price-high">Price: High → Low</option>
          <option value="size-low">Size: Small → Large</option>
          <option value="size-high">Size: Large → Small</option>
        </select>
      </div>

      <div class="toolbar-bottom">
        <div class="results-count" id="resultsCount">Loading wheels...</div>
        <button class="clear-btn" id="clearFilters">Clear Filters</button>
      </div>

      <div class="active-tags" id="activeTags"></div>
    </div>

    <div id="status">Loading wheel catalog...</div>
    <div id="wheels-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    const CSV_URL = "wheels.csv";
    const QUOTE_URL = "https://presidentwheels.ca/contact-us";
    const PHONE_LINK = "tel:+12266981667";
    const ITEMS_PER_PAGE = 24;

    let allWheels = [];
    let filteredWheels = [];
    let currentPage = 1;

    const searchInput = document.getElementById("searchInput");
    const diameterFilter = document.getElementById("diameterFilter");
    const brandFilter = document.getElementById("brandFilter");
    const finishFilter = document.getElementById("finishFilter");
    const boltFilter = document.getElementById("boltFilter");
    const sortFilter = document.getElementById("sortFilter");
    const wheelsGrid = document.getElementById("wheels-grid");
    const statusEl = document.getElementById("status");
    const resultsCount = document.getElementById("resultsCount");
    const clearFiltersBtn = document.getElementById("clearFilters");
    const paginationEl = document.getElementById("pagination");
    const activeTagsEl = document.getElementById("activeTags");

    function safeValue(v) {
      return (v || "").toString().trim();
    }

    function escapeHtml(str) {
      return safeValue(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function uniqueSorted(values, numeric = false) {
      const arr = [...new Set(values.filter(Boolean))];
      if (numeric) return arr.sort((a, b) => Number(a) - Number(b));
      return arr.sort((a, b) => a.localeCompare(b));
    }

    function fillSelect(selectEl, values, firstLabel) {
      selectEl.innerHTML = `<option value="">${firstLabel}</option>`;
      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        selectEl.appendChild(opt);
      });
    }

    function buildCard(wheel) {
      const manufacturer = escapeHtml(wheel.Manufacturer);
      const model = escapeHtml(wheel.Model);
      const diameter = escapeHtml(wheel.Diameter);
      const width = escapeHtml(wheel.Width);
      const finish = escapeHtml(wheel.Finish);
      const boltPattern = escapeHtml(wheel["Bolt Pattern"]);
      const offset = escapeHtml(wheel.Offset);
      const mapPrice = escapeHtml(wheel.MAP);
      const img = safeValue(wheel["Image 1"]);
      const bore = escapeHtml(wheel.Bore);

      return `
        <div class="wheel-card">
          <div class="img-wrap">
            <img src="${img}" alt="${manufacturer} ${model} ${diameter}x${width} ${finish}" loading="lazy">
          </div>
          <div class="brand">${manufacturer}</div>
          <div class="title">${model}</div>
          <div class="specs">
            ${diameter}" x ${width}<br>
            ${finish}<br>
            Bolt Pattern: ${boltPattern}<br>
            Offset: ${offset}${offset ? " mm" : ""}${bore ? `<br>Bore: ${bore}` : ""}
          </div>
          <div class="price">$${mapPrice}</div>
          <div class="actions">
            <a class="btn btn-call" href="${PHONE_LINK}">Call Now</a>
            <a class="btn btn-quote" href="${QUOTE_URL}" target="_blank" rel="noopener">Request Quote</a>
          </div>
        </div>
      `;
    }

    function getFilteredWheels() {
      const query = safeValue(searchInput.value).toLowerCase();
      const diameter = safeValue(diameterFilter.value);
      const brand = safeValue(brandFilter.value);
      const finish = safeValue(finishFilter.value);
      const bolt = safeValue(boltFilter.value);
      const sort = safeValue(sortFilter.value);

      let filtered = allWheels.filter(wheel => {
        const searchable = [
          wheel.Manufacturer,
          wheel.Model,
          wheel.Description,
          wheel.Diameter,
          wheel.Width,
          wheel.Finish,
          wheel["Bolt Pattern"],
          wheel.Offset
        ].join(" ").toLowerCase();

        const matchesQuery = !query || searchable.includes(query);
        const matchesDiameter = !diameter || safeValue(wheel.Diameter) === diameter;
        const matchesBrand = !brand || safeValue(wheel.Manufacturer) === brand;
        const matchesFinish = !finish || safeValue(wheel.Finish) === finish;
        const matchesBolt = !bolt || safeValue(wheel["Bolt Pattern"]) === bolt;

        return matchesQuery && matchesDiameter && matchesBrand && matchesFinish && matchesBolt;
      });

      if (sort === "price-low") filtered.sort((a, b) => Number(a.MAP) - Number(b.MAP));
      if (sort === "price-high") filtered.sort((a, b) => Number(b.MAP) - Number(a.MAP));
      if (sort === "size-low") filtered.sort((a, b) => Number(a.Diameter) - Number(b.Diameter));
      if (sort === "size-high") filtered.sort((a, b) => Number(b.Diameter) - Number(a.Diameter));

      return filtered;
    }

    function updateActiveTags() {
      const tags = [];

      if (safeValue(searchInput.value)) tags.push(`Search: ${safeValue(searchInput.value)}`);
      if (safeValue(diameterFilter.value)) tags.push(`${safeValue(diameterFilter.value)}"`);
      if (safeValue(brandFilter.value)) tags.push(safeValue(brandFilter.value));
      if (safeValue(finishFilter.value)) tags.push(safeValue(finishFilter.value));
      if (safeValue(boltFilter.value)) tags.push(safeValue(boltFilter.value));

      const sortLabels = {
        "price-low": "Price Low → High",
        "price-high": "Price High → Low",
        "size-low": "Size Small → Large",
        "size-high": "Size Large → Small"
      };

      if (safeValue(sortFilter.value)) tags.push(sortLabels[safeValue(sortFilter.value)]);

      activeTagsEl.innerHTML = tags.map(tag => `<div class="tag">${escapeHtml(tag)}</div>`).join("");
    }

    function renderPagination(totalItems) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
      paginationEl.innerHTML = "";

      if (totalPages <= 1) return;

      const prevBtn = document.createElement("button");
      prevBtn.className = "page-btn";
      prevBtn.textContent = "Prev";
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        currentPage--;
        renderWheels();
      };
      paginationEl.appendChild(prevBtn);

      const maxVisible = 5;
      let start = Math.max(1, currentPage - 2);
      let end = Math.min(totalPages, start + maxVisible - 1);

      if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1);

      for (let i = start; i <= end; i++) {
        const btn = document.createElement("button");
        btn.className = "page-btn" + (i === currentPage ? " active" : "");
        btn.textContent = i;
        btn.onclick = () => {
          currentPage = i;
          renderWheels();
        };
        paginationEl.appendChild(btn);
      }

      const nextBtn = document.createElement("button");
      nextBtn.className = "page-btn";
      nextBtn.textContent = "Next";
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => {
        currentPage++;
        renderWheels();
      };
      paginationEl.appendChild(nextBtn);
    }

    function renderWheels(resetPage = false) {
      if (resetPage) currentPage = 1;

      filteredWheels = getFilteredWheels();
      updateActiveTags();

      const total = filteredWheels.length;
      const totalPages = Math.max(1, Math.ceil(total / ITEMS_PER_PAGE));

      if (currentPage > totalPages) currentPage = 1;

      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const endIndex = startIndex + ITEMS_PER_PAGE;
      const pageItems = filteredWheels.slice(startIndex, endIndex);

      resultsCount.textContent = `${total.toLocaleString()} wheels found`;
      wheelsGrid.innerHTML = pageItems.map(buildCard).join("");

      if (total === 0) {
        wheelsGrid.innerHTML = "";
        paginationEl.innerHTML = "";
        statusEl.style.display = "block";
        statusEl.textContent = "No wheels match your filters.";
      } else {
        statusEl.style.display = "none";
        renderPagination(total);
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function initFilters() {
      const diameters = uniqueSorted(allWheels.map(w => safeValue(w.Diameter)), true);
      const brands = uniqueSorted(allWheels.map(w => safeValue(w.Manufacturer)));
      const finishes = uniqueSorted(allWheels.map(w => safeValue(w.Finish)));
      const bolts = uniqueSorted(allWheels.map(w => safeValue(w["Bolt Pattern"])));

      fillSelect(diameterFilter, diameters, "All Sizes");
      fillSelect(brandFilter, brands, "All Brands");
      fillSelect(finishFilter, finishes, "All Finishes");
      fillSelect(boltFilter, bolts, "Bolt Pattern");
    }

    function clearFilters() {
      searchInput.value = "";
      diameterFilter.value = "";
      brandFilter.value = "";
      finishFilter.value = "";
      boltFilter.value = "";
      sortFilter.value = "";
      renderWheels(true);
    }

    searchInput.addEventListener("input", () => renderWheels(true));
    diameterFilter.addEventListener("change", () => renderWheels(true));
    brandFilter.addEventListener("change", () => renderWheels(true));
    finishFilter.addEventListener("change", () => renderWheels(true));
    boltFilter.addEventListener("change", () => renderWheels(true));
    sortFilter.addEventListener("change", () => renderWheels(true));
    clearFiltersBtn.addEventListener("click", clearFilters);

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        allWheels = results.data.filter(w =>
          safeValue(w["Image 1"]) &&
          safeValue(w.Manufacturer) &&
          safeValue(w.Model)
        );

        initFilters();
        renderWheels(true);
      },
      error: function(err) {
        statusEl.textContent = "Could not load wheel catalog.";
        console.error(err);
      }
    });
  </script>
</body>
</html>
